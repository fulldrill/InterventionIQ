services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5439:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spip_internal
      - spip_external

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - knowledge_docs:/app/knowledge_docs
      - ./sample_data:/app/sample_data:ro
    networks:
      - spip_internal
      - spip_external
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - spip_internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    environment:
      NGINX_FORCE_HTTPS: ${NGINX_FORCE_HTTPS:-false}
    command: >
      /bin/sh -c "
      CERTS_PRESENT=false;
      if [ -f /etc/nginx/ssl/cert.pem ] && [ -f /etc/nginx/ssl/key.pem ]; then
        CERTS_PRESENT=true;
      fi;
      if [ \"$$NGINX_FORCE_HTTPS\" = \"true\" ]; then
        if [ \"$$CERTS_PRESENT\" = \"true\" ]; then
          cp /etc/nginx/nginx.https.conf /etc/nginx/nginx.conf;
          echo 'NGINX_FORCE_HTTPS=true; starting HTTPS config';
        else
          echo 'NGINX_FORCE_HTTPS=true but TLS certs are missing at /etc/nginx/ssl/cert.pem and /etc/nginx/ssl/key.pem';
          exit 1;
        fi;
      elif [ \"$$CERTS_PRESENT\" = \"true\" ]; then
        cp /etc/nginx/nginx.https.conf /etc/nginx/nginx.conf;
        echo 'Starting nginx with HTTPS config';
      else
        cp /etc/nginx/nginx.http.conf /etc/nginx/nginx.conf;
        echo 'TLS certs missing; starting nginx in HTTP-only mode';
      fi;
      exec nginx -g 'daemon off;'
      "
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.https.conf:ro
      - ./nginx/nginx.http.conf:/etc/nginx/nginx.http.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - spip_internal
      - spip_external

volumes:
  postgres_data:
  uploads:
  knowledge_docs:

networks:
  spip_internal:
    driver: bridge
    internal: true
  spip_external:
    driver: bridge
